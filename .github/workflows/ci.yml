name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      # Compile-time database for the sqlx macros. The committed
      # backend/.sqlx/ cache deliberately covers ONLY the lib (repo
      # convention: plain `cargo sqlx prepare`); test-target queries
      # must compile online, exactly like `just check` does locally.
      # The integration tests themselves still spin up their own
      # throwaway Postgres instances via testcontainers (Docker is
      # preinstalled and running on GitHub-hosted ubuntu runners).
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: astrophoto
          POSTGRES_PASSWORD: astrophoto
          POSTGRES_DB: astrophoto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U astrophoto"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://astrophoto:astrophoto@localhost:5432/astrophoto
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (per rust-toolchain.toml)
        # rust-toolchain.toml at the repo root pins the channel and the
        # rustfmt/clippy components; no-arg install reads it.
        working-directory: .
        run: rustup toolchain install

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install sqlx-cli (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Run migrations against the compile-time database
        run: sqlx migrate run

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm via corepack
        # package.json has no `packageManager` field, so pin the version
        # explicitly (matches the lockfileVersion 9.0 lockfile).
        run: |
          corepack enable
          corepack prepare pnpm@10.26.2 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm check
        run: pnpm check

      - name: pnpm lint
        run: pnpm lint

  e2e:
    # Browser end-to-end gate: the production-readiness suite (see
    # docs/operations/production-readiness-e2e.md and
    # docs/adr/0001-browser-e2e-production-readiness-bar.md). Brings up the
    # real dev infra via docker compose (fresh volumes each run → clean,
    # deterministic DB — no cross-run data pollution), builds + runs the
    # backend and frontend, then runs Playwright. Functional + mobile + a11y +
    # security live here; perf/load + cross-browser are deliberately out (run
    # on-demand). Ports match the suite's committed defaults (frontend :5173,
    # backend :8080, pg :5434, minio :9100, mailhog :1025/:8025) so no
    # PLAYWRIGHT_* overrides are needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start infra (postgres + minio + mailhog)
        run: docker compose up -d --wait postgres minio mailhog

      - name: Install Rust toolchain (per rust-toolchain.toml)
        run: rustup toolchain install

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install sqlx-cli (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Migrate + build backend
        working-directory: backend
        env:
          DATABASE_URL: postgres://astrophoto:astrophoto@localhost:5434/astrophoto
        run: |
          sqlx migrate run
          cargo build --bin astrophoto

      - name: Run backend (:8080)
        working-directory: backend
        run: |
          # The backend dotenv-loads ../.env (see main.rs). The committed
          # template already targets the compose infra (pg :5434, minio :9100,
          # mailhog :1025, frontend :5173, backend :8080), so materialize it as
          # the dev config — same mechanism as `just dev` locally.
          cp ../.env.example ../.env
          nohup ./target/debug/astrophoto > backend.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8080/healthz >/dev/null && break; sleep 1; done
          curl -sf http://localhost:8080/healthz >/dev/null || { echo "backend failed to start"; cat backend.log; exit 1; }

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.26.2 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install psql (helpers verify email via SQL on :5434)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run frontend (:5173)
        working-directory: frontend
        env:
          BACKEND_URL: http://localhost:8080
        run: |
          nohup pnpm exec vite dev --port 5173 > vite.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:5173 >/dev/null && break; sleep 1; done
          curl -sf http://localhost:5173 >/dev/null || { echo "frontend failed to start"; cat vite.log; exit 1; }

      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: frontend
        run: pnpm exec playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
