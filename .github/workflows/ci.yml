name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      # Compile-time database for the sqlx macros. The committed
      # backend/.sqlx/ cache deliberately covers ONLY the lib (repo
      # convention: plain `cargo sqlx prepare`); test-target queries
      # must compile online, exactly like `just check` does locally.
      # The integration tests themselves still spin up their own
      # throwaway Postgres instances via testcontainers (Docker is
      # preinstalled and running on GitHub-hosted ubuntu runners).
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: astrophoto
          POSTGRES_PASSWORD: astrophoto
          POSTGRES_DB: astrophoto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U astrophoto"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://astrophoto:astrophoto@localhost:5432/astrophoto
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (per rust-toolchain.toml)
        # rust-toolchain.toml at the repo root pins the channel and the
        # rustfmt/clippy components; no-arg install reads it.
        working-directory: .
        run: rustup toolchain install

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install sqlx-cli (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Run migrations against the compile-time database
        run: sqlx migrate run

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm via corepack
        # package.json has no `packageManager` field, so pin the version
        # explicitly (matches the lockfileVersion 9.0 lockfile).
        run: |
          corepack enable
          corepack prepare pnpm@10.26.2 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm check
        run: pnpm check

      - name: pnpm lint
        run: pnpm lint
