name: astrophoto

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: astrophoto
      POSTGRES_PASSWORD: astrophoto
      POSTGRES_DB: astrophoto
    ports:
      # Host port 5434 to avoid clash with other dev Postgres instances.
      - "5434:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astrophoto"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      # Host ports 9100/9101 to avoid clash with other dev MinIO on 9000/9001.
      - "9100:9000"
      - "9101:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    # Always-on dev infra (same role as postgres/minio): the backend connects
    # to it on boot. Pinned at v1.0.1 — last upstream release; project is
    # feature-complete for an SMTP sink.
    image: mailhog/mailhog:v1.0.1
    ports:
      # 1025 = SMTP, 8025 = web UI (open http://localhost:8025).
      - "1025:1025"
      - "8025:8025"
    # In-memory storage; messages cleared on restart. Fine for dev.
    restart: unless-stopped
    healthcheck:
      # MailHog's `mailhog/mailhog:v1.0.1` Alpine image ships with `nc` (busybox).
      # Probing the SMTP port is the cheapest reliable signal.
      test: ["CMD", "nc", "-z", "localhost", "1025"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    profiles: ["full"]
    environment:
      APP_BIND: 0.0.0.0:8080
      APP_LOG: info
      APP_DATABASE_URL: postgres://astrophoto:astrophoto@postgres:5432/astrophoto
      APP_SESSION_SECURE: "false"
      # Origin embedded in outgoing email links — the user-facing
      # SvelteKit origin, not the backend.
      APP_PUBLIC_BASE_URL: http://localhost:5173
      APP_S3_ENDPOINT: http://minio:9000
      APP_S3_REGION: us-east-1
      APP_S3_BUCKET: astrophoto
      APP_S3_ACCESS_KEY: minioadmin
      APP_S3_SECRET_KEY: minioadmin
      APP_S3_PATH_STYLE: "true"
      APP_CDN_BASE_URL: http://localhost:8080/cdn
      # Mail goes to the mailhog service (web UI on http://localhost:8025).
      APP_SMTP_HOST: mailhog
      APP_SMTP_PORT: "1025"
      APP_SMTP_TLS: "false"
      APP_SMTP_USER: ""
      APP_SMTP_PASS: ""
      APP_MAIL_FROM: Astrophoto <noreply@astrophoto.local>
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    profiles: ["full"]
    environment:
      ORIGIN: http://localhost:5173
      # Server-only origin used by the SvelteKit /api/[...rest] reverse
      # proxy. (VITE_API_BASE_URL is build-time-only and was a no-op here.)
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - "5173:3000"
